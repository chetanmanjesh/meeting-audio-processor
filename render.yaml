services:
  - type: web
    name: meeting-audio-processor
    runtime: python
    plan: free
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: ACCESS_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.10"
